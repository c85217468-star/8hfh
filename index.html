<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Live Chat Archive</title>

    <link
        rel="stylesheet"
        href="style.css"
    >
</head>

<body>

    <main class="container">

        <!-- ================================= -->
        <!-- الأرشيف -->
        <!-- ================================= -->

        <section class="panel">

            <div class="panel-header">
                <h1>أرشيف الرسائل</h1>

                <span id="archiveCount">
                    0 رسالة
                </span>
            </div>

            <div
                id="archiveChat"
                class="chat"
            ></div>

        </section>


        <!-- ================================= -->
        <!-- البث المباشر -->
        <!-- ================================= -->

        <section class="panel live-panel">

            <div class="panel-header">

                <h2>البث المباشر</h2>

                <span id="status">
                    جاري الاتصال...
                </span>

            </div>

            <div
                id="liveChat"
                class="chat"
            ></div>

        </section>

    </main>


    <!-- Supabase -->
    <script
        src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
    ></script>


    <!-- كود الموقع -->
    <script src="script.js"></script>

</body>

</html>
    </div>

    <script src="script.js"></script>

</body>
</html>
