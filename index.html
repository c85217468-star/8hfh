<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>البث المباشر</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>


<body>


    <main class="container">


        <!-- ================================= -->
        <!-- الصفحة الرئيسية: البث المباشر -->
        <!-- ================================= -->

        <section
            id="livePage"
            class="page active"
        >


            <header class="page-header">

                <h1>
                    البث المباشر
                </h1>

            </header>


            <!-- رسائل البث -->

            <div
                id="liveChat"
                class="chat"
            ></div>


            <!-- حالة الاتصال -->

            <div
                id="status"
                class="status"
            >
                جاري الاتصال...
            </div>


            <!-- زر الأرشيف -->

            <button
                id="openArchiveButton"
                class="main-button"
            >
                فتح أرشيف الرسائل
            </button>


        </section>



        <!-- ================================= -->
        <!-- صفحة الأرشيف -->
        <!-- ================================= -->

        <section
            id="archivePage"
            class="page"
        >


            <header class="page-header">

                <h1>
                    أرشيف الرسائل
                </h1>


                <span
                    id="archiveCount"
                >
                    0 رسالة
                </span>

            </header>


            <!-- الرسائل المحفوظة -->

            <div
                id="archiveChat"
                class="chat"
            ></div>


            <!-- العودة للبث -->

            <button
                id="backToLiveButton"
                class="main-button"
            >
                العودة إلى البث المباشر
            </button>


        </section>


    </main>



    <!-- ================================= -->
    <!-- Supabase -->
    <!-- ================================= -->

    <script
        src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
    ></script>


    <!-- ================================= -->
    <!-- JavaScript -->
    <!-- ================================= -->

    <script
        src="script.js"
    ></script>


</body>

</html>
